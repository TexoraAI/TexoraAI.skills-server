server:
  port: 8094

spring:
  application:
    name: attendance-service

  datasource:
    url: jdbc:postgresql://localhost:5432/attendance_db
    username: postgres
    password: Shareef@1234
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  redis:
    host: localhost
    port: 6379

  # ==================================================
  # 🔥 KAFKA CONFIG (NOW PRODUCER + CONSUMER ENABLED)
  # ==================================================
  kafka:
    bootstrap-servers: localhost:9092

    # 📥 CONSUMER — receive batch events
    consumer:
      group-id: attendance-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false

    # 📤 PRODUCER — send attendance marked events
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

# ================= JWT =================
jwt:
  secret: ${JWT_SECRET:mysupersecretkeymysupersecretkey}
  expiration: 3600000

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.springframework.security: INFO
    org.springframework.kafka: INFO

# ================= TOPICS =================
topics:
  user: user-events
  batch-assignment: batch-assignment
  batch-lifecycle: batch-lifecycle
