name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}

          # Prevent timeout during docker build
          command_timeout: 30m

          script: |

            set -e

            echo "================================="
            echo "Connecting to server..."
            echo "================================="

            cd TexoraAI.skills-server

            echo "================================="
            echo "Pulling latest code..."
            echo "================================="

            git pull origin main

            echo "================================="
            echo "Detecting changed services..."
            echo "================================="

            CHANGED_SERVICES=$(git diff --name-only HEAD~1 HEAD | cut -d/ -f1 | sort -u)

            echo "Changed folders:"
            echo "$CHANGED_SERVICES"

            # If nothing changed, stop deployment
            if [ -z "$CHANGED_SERVICES" ]; then
              echo "No services changed. Skipping deployment."
              exit 0
            fi

            for SERVICE in $CHANGED_SERVICES
            do
              if [ -f "$SERVICE/Dockerfile" ]; then
                echo "-----------------------------------"
                echo "Rebuilding service: $SERVICE"
                echo "-----------------------------------"

                sudo docker-compose build $SERVICE
                sudo docker-compose up -d $SERVICE

              else
                echo "Skipping $SERVICE (not a microservice folder)"
              fi
            done

            echo "================================="
            echo "Deployment completed successfully!"
            echo "================================="