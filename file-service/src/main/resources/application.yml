server:
  port: ${PORT:8092}

spring:
  application:
    name: file-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/filedb}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:Shareef@1234}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 5GB
      max-request-size: 5GB

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      # ✅ JsonSerializer — same as batch producer pattern
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: file-service-group
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
        # ✅ FIXED — HashMap not Map (Map is interface, needs concrete class)
        spring.json.value.default.type: java.util.Map
    listener:
      missing-topics-fatal: false

topics:
  batch-assignment: batch-assignment
  batch-lifecycle: batch-lifecycle
  file-uploaded: file-uploaded

file:
  storage-dir: files

logging:
  level:
    org.springframework.kafka: INFO
    org.apache.kafka: WARN
    com.lms.file: DEBUG