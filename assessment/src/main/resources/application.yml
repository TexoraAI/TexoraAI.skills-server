server:
  port: 8087

spring:
  application:
    name: assessment-service

  datasource:
    url: jdbc:postgresql://localhost:5432/assessmentdb
    username: postgres
    password: Shareef@1234

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # 🔥 REDIS
  cache:
    type: redis

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 60000

  # 🔄 KAFKA
  kafka:
    bootstrap-servers: localhost:9092

    consumer:
      group-id: assessment-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.value.default.type: java.util.HashMap
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

  # ================= FILE UPLOAD =================
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# 🔐 JWT
jwt:
  secret: mysupersecretkeymysupersecretkey
  expiration: 3600000

# 🧵 TOPICS
topics:
  assessment: assessment-events

# 📁 FILE STORAGE LOCATION
file:
  upload-dir: ./uploads

# 📝 LOGGING
logging:
  level:
    org.springframework.security: INFO
    org.springframework.kafka: INFO
    com.lms.assessment: DEBUG
